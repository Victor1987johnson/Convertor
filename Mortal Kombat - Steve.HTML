document.addEventListener('DOMContentLoaded', function() {
    // 1. Existing Date Restriction Logic
    const dueInput = document.getElementById('due');
    const today = new Date();
    const minDate = new Date(today);
    minDate.setDate(today.getDate() + 1);
    const minStr = minDate.toISOString().split('T')[0];
    const maxDate = new Date(today);
    maxDate.setDate(today.getDate() + 24);
    const maxStr = maxDate.toISOString().split('T')[0];
    dueInput.setAttribute('min', minStr);
    dueInput.setAttribute('max', maxStr);
    dueInput.value = minStr;

    // 2. NEW: Random Booking Reference Generator
    // Specify the numeric range
    const minNum = 198610195;
    const maxNum = 198699999;
    const randomNum = Math.floor(Math.random() * (maxNum - minNum + 1)) + minNum;
    
    // Target the "pnr2" field and inject the "FW" prefix + random number
    const pnr2Field = document.getElementById('pnr2');
    if (pnr2Field) {
        pnr2Field.value = "FW-" + randomNum;
    }
});

																				<p style="margin: 0; margin-bottom: 16px;">2. <strong>Third-Party Payer Verification</strong> (If Applicable)</p>
																				<p style="margin: 0; margin-bottom: 16px;">If the credit/debit cardholder is <strong>not</strong> one of the traveling passengers, we require the following additional security step to prevent unauthorised use:</p>

																				<p style="margin: 0; margin-bottom: 16px;"><strong>Identity Verification:</strong> Please attach a clear photo of the cardholder's Government Issued ID and a photo of the front of the payment card.</p>

																			<div style="color:#555555;direction:ltr;font-family:Arial, 'Helvetica Neue', Helvetica, sans-serif;font-size:14px;font-weight:400;letter-spacing:0px;line-height:1.2;text-align:left;mso-line-height-alt:17px;">
																				<p style="margin: 0; margin-bottom: 16px;">These Terms & Conditions (the <strong>"Agreement"</strong>) govern all bookings made with us (<strong>the Company: Flywatchers.co.uk</strong>, a leading travel brand trading under <strong>Flycations Ltd</strong>) ("we," "us," or "our") and apply to you, the Customer ("you" or "your"). By making a booking, you accept this Agreement on behalf of all persons in your party.</p>
																				<p dir="auto" style="margin: 0; margin-bottom: 16px;"><br><strong>I. Agency Role and Liability</strong></p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Agency Role:</strong> <strong>Flywatchers.co.uk</strong> is a leading travel brand trading under Flycations Ltd. We act only as an intermediary (Agent). Your legal contract for the provision of the travel service (e.g., the flight) is with the Principal Supplier (Airline).</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Package Travel Regulations:</strong> If you purchase a package holiday or a linked travel arrangement from us, specific liability rules under the UK/EU Package Travel Regulations will apply, and you will be informed of this at the time of booking.</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Limitation of Liability:</strong> We are <strong>NOT LIABLE</strong> for any act, omission, loss, or damage caused by the Principal Supplier, including (but not limited to) flight delays, cancellations, baggage loss, denied boarding, or overbooking.</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Remedy:</strong> Any claim for compensation, refund, or service failure must be directed solely to the Principal Supplier (Airline).</p>
																				<p dir="auto" style="margin: 0; margin-bottom: 16px;"><strong>II. Financial Terms and Payments</strong></p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>a) Initial Service Payment (Non-Refundable)</strong></p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Non-Refundable Status:</strong> The Initial Service Payment is strictly non-refundable and non-transferable to other bookings or passengers. This applies in all circumstances, including passenger cancellation, failure to pay the remaining balance, or failure to provide anti-fraud verification documents.</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Purpose of the Fee:</strong> This payment consists of a Non-Refundable Agency Service Fee (for professional services already rendered, such as consultation and setup) and a Supplier Reservation Payment (to secure your provisional seat).</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Supplier Exceptions:</strong> Refunds are only possible if the Airline explicitly grants a written exception. Unless and until such an exception is formally granted, you acknowledge that the payment remains 100% non-recoverable.</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>b) Price Guarantee and Fare Fluctuation</strong></p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Provisional Price:</strong> Your Initial Payment secures a provisional seat but does not guarantee the final fare.</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Confirmed Price:</strong> The total price is only guaranteed once the full balance is paid in cleared funds and the electronic ticket (e-ticket) is officially issued.</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Pre-Ticketing Increases:</strong> Until the e-ticket is issued, you are liable for any increases in fare, including government-imposed taxes, fuel surcharges, or airline adjustments.</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>c) Final Payment and Deadlines</strong></p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Deadline Compliance:</strong> The full balance must be received by the stated deadline. Failure to do so results in automatic cancellation and forfeiture of the Initial Service Payment.</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Late Payment:</strong> If a deadline is missed but we successfully restore the booking, no additional late fee applies, but the customer remains liable for any fare/tax increases occurring during the delay.</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Re-booking Grace Period:</strong> If the deadline is missed, the Initial Payment may be applied to a new booking at current market rates within 5 days.</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>d) Mandatory Confirmation Sequence</strong></p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Customer Verification:</strong> No payment link is issued until the customer has replied with the phrase <strong>"I CONFIRM TO BOOK."</strong></p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Legal Acknowledgement:</strong> By providing this reply, you certify you have reviewed the itinerary, passenger names, and financial breakdown for accuracy.</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Payment Authorisation:</strong> Completion of the secure payment link constitutes your final legal authorisation after reviewing all restrictive rules.</p>
																				<p dir="auto" style="margin: 0; margin-bottom: 16px;"><strong>III. Changes and Cancellations by You (The Customer)</strong></p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>a) Voluntary Cancellation and Refunds</strong></p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Ticket Flexibility:</strong> Most tickets are based on restrictive fare rules and are generally non-refundable (Base Fare and many taxes/fees).</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Discretionary Partial Refund (Pre-Deadline):</strong> If you cancel before the balance deadline, we may offer a "Goodwill Settlement" discretionary partial refund, requiring a Card Holder Government Photo ID for verification.</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Post-Deadline Status:</strong> Once the deadline passes or the ticket is issued, the booking enters 100% Non-Recoverable Cost Status. No refund is possible.</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Finality:</strong> Any agreed partial refund is a full and final settlement. By accepting it, you waive all rights to further claims or chargebacks.</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Forfeiture:</strong> The entire fare is forfeited for "No-Shows" or denied boarding due to missing documentation.</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>b) Amendments (Changes to Existing Booking)</strong></p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Change Feasibility:</strong> All changes (date, time, routing) are subject to airline fare rules. Many fares do not permit changes.</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Change Fees:</strong> Where permitted, changes incur Airline Charges (amendment fee + fare difference) and our <strong>Agency Amendment Fee of £45.00 per ticket.</strong></p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>c) Name Changes and Corrections</strong></p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Seat Transfers:</strong> Transferring a seat to another person is not permitted under most airline rules.</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Before Ticketing:</strong> Name changes before issuance are subject to immediate re-pricing of the entire booking.</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>After Ticketing:</strong> Complete name changes are strictly prohibited.</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Minor Corrections:</strong> Minor spelling corrections permitted by the airline are subject to Airline Fees, Fare/Tax differences, and our <strong>Agency Correction Fee of £45.00 per ticket.</strong></p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>d) Voluntary Tax Reclamation</strong></p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Applicable Taxes:</strong> You may be entitled to a refund of certain government taxes if you cancel.</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Agency Service Fee:</strong> A non-refundable agency service fee of <strong>£45.00 per ticket</strong> will be deducted from the recoverable amount.</p>
																				<p dir="auto" style="margin: 0; margin-bottom: 16px;"><strong>IV. Schedule Changes and Disruptions</strong></p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Airline Responsibility:</strong> Your rights (re-routing, assistance, compensation) are governed by the Airline’s Conditions of Carriage and UK/EC Regulation 261/2004.</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Minor Changes:</strong> Modifications less than 12 hours or changes to aircraft type/flight number are considered minor and do not entitle the passenger to a full refund.</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Irregular Operations (IROP):</strong> For disruptions within 72 hours of departure (cancellations/misconnections), the airline will rebook you at no additional cost (usually within 2 days of original dates).</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Major Schedule Changes:</strong> Defined as a change of more than 12 hours or a change in arrival/departure airport. If unacceptable, you are entitled to a full refund of the unused ticket portion.</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Agency Fee for Cash Refunds:</strong> If you accept a cash refund from the airline (rather than re-accommodation), we reserve the right to apply an <strong>Agency Service Fee of £75.00 per ticket</strong> for administrative processing.</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Refundable Items:</strong> Certain non-refundable charges (card fees, convenience fees, previously collected penalties) are excluded from the refund amount.</p>
																				<p dir="auto" style="margin: 0; margin-bottom: 16px;"><strong>V. Traveller Responsibility and Documentation</strong></p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Sole Responsibility:</strong> It is exclusively your responsibility to hold the correct, valid passport, visa, and health documents for every country on your itinerary, including transiting points.</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Validity:</strong> Passports must meet minimum validity periods (typically 6 months beyond return).</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Consequence of Failure:</strong> We and the airline accept no liability for denied boarding or entry due to incorrect documentation.</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Flight Reconfirmation:</strong> We strongly recommend reconfirming flight details 72 hours prior to departure.</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Local Taxes:</strong> Customers are responsible for paying any local destination taxes (e.g., tourist tax) directly to the local authorities/hotels.</p>
																				<p dir="auto" style="margin: 0; margin-bottom: 16px;"><strong>VI. Dispute Resolution & Anti-Fraud</strong></p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Mandatory Contact Protocol:</strong> You must contact us in writing and allow <strong>30 days</strong> to seek resolution before pursuing a chargeback or payment dispute. Initiating a chargeback for a valid non-refundable fee constitutes a breach of this agreement.</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Waiver of Class Action:</strong> By accepting these terms, you agree to waive any right to participate in a class-action lawsuit.</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Chargebacks and Costs:</strong> Unfounded chargebacks (raised without following protocol or contrary to agreed terms) will be defended. If successful, you agree to reimburse us for all costs, including an internal processing fee of <strong>£150.00 per instance.</strong></p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Security and Verification:</strong> To mitigate fraud, we reserve the right to request a signed Card Authorisation Form and photo ID. Failure to comply results in cancellation and forfeiture of the Initial Service Payment.</p>
																				<p dir="auto" style="margin: 0; margin-bottom: 16px;"><strong>VII. Essential Travel Requirements and Advice</strong></p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>a) Passports and Visas</strong></p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Validity:</strong> Minimum 6 months beyond return date required.</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Condition:</strong> Passports must be in excellent condition (no torn pages or water damage).</p>

																					<p style="margin: 0; mso-line-height-alt: 18px;"><strong>E-Ticket Issuance:</strong> Your actual travel tickets are only issued <em>after</em> the full balance is received.</p>

																					<p style="margin: 0; mso-line-height-alt: 18px;">&nbsp;</p>
																					<p style="margin: 0; mso-line-height-alt: 18px;"><strong>Balance Due:</strong> To finalise your journey and issue your e-tickets, please ensure the remaining balance is settled before the ticketing deadline on <strong>DUE1DATE (17:00 GMT/BST)</strong>. &nbsp;</p>

																			<div style="color:#555555;direction:ltr;font-family:Arial, 'Helvetica Neue', Helvetica, sans-serif;font-size:14px;font-weight:400;letter-spacing:0px;line-height:1.2;text-align:left;mso-line-height-alt:17px;">
																				<p dir="auto" style="margin: 0; margin-bottom: 16px;"><strong>Brief Terms & Conditions for Flight Itinerary Booking</strong></p>
																				<p style="margin: 0; margin-bottom: 16px;">These Terms & Conditions (the <strong>"Agreement"</strong>) govern all bookings made with us (<strong>the Company: Flywatchers.co.uk</strong>, a leading travel brand trading under <strong>Flycations Ltd</strong>) ("we," "us," or "our") and apply to you, the Customer ("you" or "your"). By making a booking, you accept this Agreement on behalf of all persons in your party.</p>
																				<p dir="auto" style="margin: 0; margin-bottom: 16px;"><br><strong>I. Agency Role and Liability</strong></p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Agency Role:</strong> <strong>Flywatchers.co.uk</strong> is a leading travel brand trading under Flycations Ltd. We act only as an intermediary (Agent). Your legal contract for the provision of the travel service (e.g., the flight) is with the Principal Supplier (Airline).</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Package Travel Regulations:</strong> If you purchase a package holiday or a linked travel arrangement from us, specific liability rules under the UK/EU Package Travel Regulations will apply, and you will be informed of this at the time of booking.</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Limitation of Liability:</strong> We are <strong>NOT LIABLE</strong> for any act, omission, loss, or damage caused by the Principal Supplier, including (but not limited to) flight delays, cancellations, baggage loss, denied boarding, or overbooking.</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Remedy:</strong> Any claim for compensation, refund, or service failure must be directed solely to the Principal Supplier (Airline).</p>
																				<p dir="auto" style="margin: 0; margin-bottom: 16px;"><strong>II. Financial Terms and Payments</strong></p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>a) Initial Service Payment (Non-Refundable)</strong></p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Non-Refundable Status:</strong> The Initial Service Payment is strictly non-refundable and non-transferable to other bookings or passengers. This applies in all circumstances, including passenger cancellation, failure to pay the remaining balance, or failure to provide anti-fraud verification documents.</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Purpose of the Fee:</strong> This payment consists of a Non-Refundable Agency Service Fee (for professional services already rendered, such as consultation and setup) and a Supplier Reservation Payment (to secure your provisional seat).</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Supplier Exceptions:</strong> Refunds are only possible if the Airline explicitly grants a written exception. Unless and until such an exception is formally granted, you acknowledge that the payment remains 100% non-recoverable.</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>b) Price Guarantee and Fare Fluctuation</strong></p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Provisional Price:</strong> Your Initial Payment secures a provisional seat but does not guarantee the final fare.</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Confirmed Price:</strong> The total price is only guaranteed once the full balance is paid in cleared funds and the electronic ticket (e-ticket) is officially issued.</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Pre-Ticketing Increases:</strong> Until the e-ticket is issued, you are liable for any increases in fare, including government-imposed taxes, fuel surcharges, or airline adjustments.</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>c) Final Payment and Deadlines</strong></p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Deadline Compliance:</strong> The full balance must be received by the stated deadline. Failure to do so results in automatic cancellation and forfeiture of the Initial Service Payment.</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Late Payment:</strong> If a deadline is missed but we successfully restore the booking, no additional late fee applies, but the customer remains liable for any fare/tax increases occurring during the delay.</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Re-booking Grace Period:</strong> If the deadline is missed, the Initial Payment may be applied to a new booking at current market rates within 5 days.</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>d) Mandatory Confirmation Sequence</strong></p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Customer Verification:</strong> No payment link is issued until the customer has replied with the phrase <strong>"I CONFIRM TO BOOK."</strong></p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Legal Acknowledgement:</strong> By providing this reply, you certify you have reviewed the itinerary, passenger names, and financial breakdown for accuracy.</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Payment Authorisation:</strong> Completion of the secure payment link constitutes your final legal authorisation after reviewing all restrictive rules.</p>
																				<p dir="auto" style="margin: 0; margin-bottom: 16px;"><strong>III. Changes and Cancellations by You (The Customer)</strong></p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>a) Voluntary Cancellation and Refunds</strong></p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Ticket Flexibility:</strong> Most tickets are based on restrictive fare rules and are generally non-refundable (Base Fare and many taxes/fees).</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Discretionary Partial Refund (Pre-Deadline):</strong> If you cancel before the balance deadline, we may offer a "Goodwill Settlement" discretionary partial refund, requiring a Card Holder Government Photo ID for verification.</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Post-Deadline Status:</strong> Once the deadline passes or the ticket is issued, the booking enters 100% Non-Recoverable Cost Status. No refund is possible.</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Finality:</strong> Any agreed partial refund is a full and final settlement. By accepting it, you waive all rights to further claims or chargebacks.</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Forfeiture:</strong> The entire fare is forfeited for "No-Shows" or denied boarding due to missing documentation.</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>b) Amendments (Changes to Existing Booking)</strong></p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Change Feasibility:</strong> All changes (date, time, routing) are subject to airline fare rules. Many fares do not permit changes.</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Change Fees:</strong> Where permitted, changes incur Airline Charges (amendment fee + fare difference) and our <strong>Agency Amendment Fee of £45.00 per ticket.</strong></p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>c) Name Changes and Corrections</strong></p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Seat Transfers:</strong> Transferring a seat to another person is not permitted under most airline rules.</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Before Ticketing:</strong> Name changes before issuance are subject to immediate re-pricing of the entire booking.</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>After Ticketing:</strong> Complete name changes are strictly prohibited.</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Minor Corrections:</strong> Minor spelling corrections permitted by the airline are subject to Airline Fees, Fare/Tax differences, and our <strong>Agency Correction Fee of £45.00 per ticket.</strong></p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>d) Voluntary Tax Reclamation</strong></p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Applicable Taxes:</strong> You may be entitled to a refund of certain government taxes if you cancel.</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Agency Service Fee:</strong> A non-refundable agency service fee of <strong>£45.00 per ticket</strong> will be deducted from the recoverable amount.</p>
																				<p dir="auto" style="margin: 0; margin-bottom: 16px;"><strong>IV. Schedule Changes and Disruptions</strong></p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Airline Responsibility:</strong> Your rights (re-routing, assistance, compensation) are governed by the Airline’s Conditions of Carriage and UK/EC Regulation 261/2004.</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Minor Changes:</strong> Modifications less than 12 hours or changes to aircraft type/flight number are considered minor and do not entitle the passenger to a full refund.</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Irregular Operations (IROP):</strong> For disruptions within 72 hours of departure (cancellations/misconnections), the airline will rebook you at no additional cost (usually within 2 days of original dates).</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Major Schedule Changes:</strong> Defined as a change of more than 12 hours or a change in arrival/departure airport. If unacceptable, you are entitled to a full refund of the unused ticket portion.</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Agency Fee for Cash Refunds:</strong> If you accept a cash refund from the airline (rather than re-accommodation), we reserve the right to apply an <strong>Agency Service Fee of £75.00 per ticket</strong> for administrative processing.</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Refundable Items:</strong> Certain non-refundable charges (card fees, convenience fees, previously collected penalties) are excluded from the refund amount.</p>
																				<p dir="auto" style="margin: 0; margin-bottom: 16px;"><strong>V. Traveller Responsibility and Documentation</strong></p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Sole Responsibility:</strong> It is exclusively your responsibility to hold the correct, valid passport, visa, and health documents for every country on your itinerary, including transiting points.</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Validity:</strong> Passports must meet minimum validity periods (typically 6 months beyond return).</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Consequence of Failure:</strong> We and the airline accept no liability for denied boarding or entry due to incorrect documentation.</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Flight Reconfirmation:</strong> We strongly recommend reconfirming flight details 72 hours prior to departure.</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Local Taxes:</strong> Customers are responsible for paying any local destination taxes (e.g., tourist tax) directly to the local authorities/hotels.</p>
																				<p dir="auto" style="margin: 0; margin-bottom: 16px;"><strong>VI. Dispute Resolution & Anti-Fraud</strong></p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Mandatory Contact Protocol:</strong> You must contact us in writing and allow <strong>30 days</strong> to seek resolution before pursuing a chargeback or payment dispute. Initiating a chargeback for a valid non-refundable fee constitutes a breach of this agreement.</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Waiver of Class Action:</strong> By accepting these terms, you agree to waive any right to participate in a class-action lawsuit.</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Chargebacks and Costs:</strong> Unfounded chargebacks (raised without following protocol or contrary to agreed terms) will be defended. If successful, you agree to reimburse us for all costs, including an internal processing fee of <strong>£150.00 per instance.</strong></p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Security and Verification:</strong> To mitigate fraud, we reserve the right to request a signed Card Authorisation Form and photo ID. Failure to comply results in cancellation and forfeiture of the Initial Service Payment.</p>

																				<p style="margin: 0; margin-bottom: 16px;"><strong>b) Check-in and Boarding</strong></p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>Times:</strong> Intercontinental (3 hours); European/Domestic (2 hours). Check-in typically closes 1 hour before departure.</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>E-Tickets:</strong> Present your passport and a printout of your confirmation email at the airport.</p>
																				<p style="margin: 0; margin-bottom: 16px;"><strong>c) Seating and Meals</strong></p>

const TEMPLATE_8 = `<h1>Template 8 Content</h1>`; // (Keep your existing TEMPLATE_8 content)

let activeTab = 1;

function switchEmail(tabNum) {
    activeTab = tabNum;
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    document.getElementById('tab' + tabNum).classList.add('active');
    updatePreview();
}

function updatePreview() {
    // Perform Auto Calculation
    const depositVal = parseFloat(document.getElementById('deposit').value) || 0;
    const cancelFeeVal = parseFloat(document.getElementById('cancelfee').value) || 0;
    const refundTotal = (depositVal - cancelFeeVal).toFixed(2);

    let template = "";
    if (activeTab === 1) template = TEMPLATE_1;
    else if (activeTab === 2) template = TEMPLATE_2;
    else if (activeTab === 3) template = TEMPLATE_3;
    else if (activeTab === 4) template = TEMPLATE_4;
    else if (activeTab === 5) template = TEMPLATE_5;
    else if (activeTab === 6) template = TEMPLATE_6;
    else if (activeTab === 7) template = TEMPLATE_7;
    else if (activeTab === 8) template = TEMPLATE_8;

    const replacements = {
        "TODAYDATE": new Date().toLocaleDateString('en-GB', { day: '2-digit', month: 'long', year: 'numeric' }),
        "DUE1DATE": (() => {
    const rawDate = document.getElementById('due')?.value;
    if (!rawDate) return "";
    const dateObj = new Date(rawDate);
    const day = String(dateObj.getDate()).padStart(2, '0');
    const monthNames = ["January", "February", "March", "April", "May", "June",
                        "July", "August", "September", "October", "November", "December"];
    const month = monthNames[dateObj.getMonth()];
    const year = dateObj.getFullYear();
    return `${day}/${month}/${year}`;
})(),
        "DEPO1SIT": depositVal.toFixed(2),
        "BAL12NCE": document.getElementById('balance')?.value || "0.00",
        "TO12TAL": document.getElementById('total')?.value || "0.00",
        "AGENTN2": document.getElementById('agent')?.value || "",
        "PNR1CODE": document.getElementById('pnr')?.value || "",
        "PNR2CODE": document.getElementById('pnr2')?.value || "",
        "CITYDES": document.getElementById('dest')?.value || "",
        "PH1NE": document.getElementById('phone')?.value || "",
        "ALNAME": document.getElementById('alname')?.value || "",
        "modepay": document.getElementById('modepay')?.value || "",
        "EM1AL": document.getElementById('email')?.value || "",
        "CCLASS": document.getElementById('CCLASS')?.value || "",
        "CCHAME": document.getElementById('lead')?.value || "",
        // New calculation replacements
        "CANFEE": cancelFeeVal.toFixed(2),
        "REFONDO": refundTotal
    };

    for (const [key, value] of Object.entries(replacements)) {
        const regex = new RegExp(key, 'g');
        template = template.replace(regex, value);
    }

    const iframe = document.getElementById('display');
    iframe.srcdoc = template;
    window.lastGenerated = template;
}

function copyToClipboard() {
    if(!window.lastGenerated) { 
        alert("Nothing to copy!"); 
        return; 
    }
    const el = document.createElement('textarea');
    el.value = window.lastGenerated;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    alert("HTML Copied!");
}

// Auto-calculate Total Amount in sidebar
document.addEventListener('input', function() {
    const dep = parseFloat(document.getElementById('deposit').value) || 0;
    const bal = parseFloat(document.getElementById('balance').value) || 0;
    document.getElementById('total').value = (dep + bal).toFixed(2);
});

// Initial Load
updatePreview();
</script>
